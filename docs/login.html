  <body>
    <header>
      <div class="navbar" id="navbar">
        <a href="index.html" class="nav-logo">
          <!-- <img src="assets/images/logo/logo.png" alt="Tacho Quiz" height="46" /> -->
          Tacho <span>Quiz</span>
        </a>
        <button
          class="hamburger"
          id="hamburger"
          aria-expanded="false"
          aria-controls="nav-menu"
          aria-label="open-menu"
        >
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </button>
        <nav id="nav-menu" aria-label="Main navigation">
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="quiz.html">Quiz</a></li>
            <li><a href="score.html">Score</a></li>
            <li>
              <a href="login.html" aria-current="page" class="active">Login</a>
            </li>
            <li><a href="about.html">About</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section class="login-section">
        <div class="screen-header">
          <h1>Login</h1>
        </div>
        <form action="confirm.html" method="GET">
          <div class="login-body">
            <div class="form-group">
              <label for="username">Username</label>
              <input
                type="text"
                id="username"
                name="username"
                placeholder="Enter your username"
                autocomplete="username"
                required
              />
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="********"
                autocomplete="current-password"
                required
              />
            </div>
            <p class="error-msg" id="error-msg" aria-live="polite"></p>

            <p  class="forgot-link link-btn">This login is a simulated flow for demonstration purposes only.</p>
            <button type="submit" class="action-btn" id="login-btn">
              LOGIN
            </button>
            <div class="divider"></div>
            <p class="signup-text">
              Don't have an account? 

               <button type="button" class="link-btn">Sign Up</button>
            </p>
          </div>
        </form>
      </section>
      <div class="image-container">
        <img src="assets/images/img/truck-img2.png" alt="truck img">
      </div>
    </main>

    <footer class="footer">
      <div class="copyright">&copy;Florin Albu</div>
      <div class="footer-paragraph">
        <p>Learn tacho. Build confidence.</p>
      </div>
      <div class="social-networks">
        <ul>
          <li>
            <a
              href="https://www.facebook.com/"
              target="_blank"
              aria-label="Facebook"
              rel="noopener noreferrer"
              ><i class="fa-brands fa-facebook"></i
            ></a>
          </li>
          <li>
            <a
              href="https://www.linkedin.com/in/florin-albu-0750b6238/"
              target="_blank"
              aria-label="LinkedIn"
              rel="noopener noreferrer"
              ><i class="fa-brands fa-square-linkedin"></i
            ></a>
          </li>
        </ul>
      </div>
    </footer>

    <script
      src="https://kit.fontawesome.com/7306ceb67d.js"
      crossorigin="anonymous"
    ></script>
    <script src="assets/js/navbar.js" defer></script>
    <script src="assets/js/login.js"></script>
  </body>
</html>
