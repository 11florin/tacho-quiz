    <!-- Font Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <div class="navbar" id="navbar">
        <a href="index.html" class="nav-logo">
          <!-- <img src="assets/images/logo/logo.png" alt="Tacho Quiz" height="46" /> -->
          Tacho <span>Quiz</span>
        </a>
        <button
          class="hamburger"
          id="hamburger"
          aria-expanded="false"
          aria-controls="nav-menu"
          aria-label="open-menu"
        >
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </button>
        <nav id="nav-menu" aria-label="Main navigation">
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="quiz.html">Quiz</a></li>
            <li><a href="score.html">Score</a></li>
            <li>
              <a href="login.html" aria-current="page" class="active">Login</a>
            </li>
            <li><a href="about.html">About</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section class="login-section">
        <form action="confirm.html" method="GET">
          <div class="screan-header">
            <h1>Login</h1>
          </div>
          <div class="login-body">
            <div class="form-group">
              <label for="username">Username</label>
              <input
                type="text"
                id="username"
                placeholder="Enter your username"
                autocomplete="username"
                required
              />
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <input
                type="password"
                placeholder="********"
                autocomplete="current-password"
                required
              />
            </div>
            <p class="error-msg" id="error-msg" aria-live="polite"></p>

            <a href="#" class="forgot-link" id="forgot-link"
              >Forgot Password?</a
            >
            <button
              type="submit"
              class="action-btn action-btn--full"
              id="login-btn"
            >
              LOGIN
            </button>
            <div class="divider"></div>
            <p class="signup-text">
              Don't have an account? <a href="#" id="signup-link">Sign Up</a>
            </p>
          </div>
        </form>
      </section>
    </main>

    <footer class="footer">
      <div class="copyright">&copy;Florin Albu</div>
      <div class="footer-paragraph">
        <p>Learn tacho. Build confidence.</p>
      </div>
      <div class="social-networks">
        <ul>
          <li>
            <a
              href="https://www.facebook.com/"
              target="_blank"
              aria-label="Facebook"
              rel="noopener noreferrer"
              ><i class="fa-brands fa-facebook"></i
            ></a>
          </li>
          <li>
            <a
              href="https://www.twitter.com/"
              target="_blank"
              aria-label="Twitter"
              rel="noopener noreferrer"
              ><i class="fa-brands fa-x-twitter"></i
            ></a>
          </li>
          <li>
            <a
              href="https://www.instagram.com/"
              target="_blank"
              aria-label="Instagram"
              rel="noopener noreferrer"
              ><i class="fa-brands fa-instagram"></i
            ></a>
          </li>
          <li>
            <a
              href="https://www.youtube.com/"
              target="_blank"
              aria-label="Youtube"
              rel="noopener noreferrer"
              ><i class="fa-brands fa-square-youtube"></i
            ></a>
          </li>
        </ul>
      </div>
    </footer>

    <script src="assets/js/navbar.js"></script>
    <script
      src="https://kit.fontawesome.com/7306ceb67d.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
